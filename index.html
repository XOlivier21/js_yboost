<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex - Cartes Pokemon</title>
    <style>
        :root {
            --bg-1: #f4f7ff;
            --bg-2: #dbe7ff;
            --ink: #1f2937;
            --accent: #0f766e;
            --accent-2: #14b8a6;
            --card: #ffffff;
            --muted: #6b7280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
            background: radial-gradient(circle at 20% 20%, var(--bg-2), var(--bg-1));
            min-height: 100vh;
            color: var(--ink);
            padding: 24px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 0.5px;
        }

        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 18px;
        }

        .pokemon-card {
            background: var(--card);
            border-radius: 14px;
            box-shadow: 0 8px 28px rgba(15, 23, 42, 0.12);
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .pokemon-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 14px 28px rgba(15, 23, 42, 0.18);
        }

        .pokemon-image {
            background: linear-gradient(135deg, #cffafe, #e0e7ff);
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .pokemon-image img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .pokemon-info {
            padding: 14px;
        }

        .name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }

        .pokemon-name {
            font-size: 1.15rem;
            font-weight: 800;
        }

        .pokemon-id {
            color: var(--muted);
            font-weight: 700;
            font-size: 0.9rem;
        }

        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .types {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .type {
            padding: 4px 10px;
            border-radius: 999px;
            background: #0ea5e9;
            color: white;
            font-size: 0.8rem;
            font-weight: 700;
        }

        .state {
            margin-top: 18px;
            color: var(--muted);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Pokedex - Cartes Pokemon</h1>
        </div>

        <div id="pokemon-grid" class="pokemon-grid"></div>
        <p id="state" class="state">Chargement des pokemons...</p>
    </div>

    <script>
        const grid = document.getElementById('pokemon-grid');
        const state = document.getElementById('state');

        function createPokemonCard(pokemon) {
            const card = document.createElement('article');
            card.className = 'pokemon-card';

            card.innerHTML = `
                <div class="pokemon-image">
                    <img src="${pokemon.picture}" alt="${pokemon.name}">
                </div>
                <div class="pokemon-info">
                    <div class="name-row">
                        <h2 class="pokemon-name">${pokemon.name}</h2>
                        <span class="pokemon-id">#${pokemon.id}</span>
                    </div>
                    <div class="stats">
                        <span><strong>HP:</strong> ${pokemon.hp}</span>
                        <span><strong>CP:</strong> ${pokemon.cp}</span>
                    </div>
                    <div class="types">
                        ${(pokemon.types || []).map((type) => `<span class="type">${type}</span>`).join('')}
                    </div>
                </div>
            `;

            return card;
        }

        async function loadPokemons() {
            try {
                const response = await fetch('/api/pokemons');
                if (!response.ok) {
                    throw new Error('Erreur API: ' + response.status);
                }

                const payload = await response.json();
                const data = payload.data || [];

                grid.innerHTML = '';
                data.forEach((pokemon) => {
                    grid.appendChild(createPokemonCard(pokemon));
                });

                state.textContent = `${data.length} pokemons affiches`;
            } catch (error) {
                state.textContent = 'Impossible de charger les pokemons.';
            }
        }

        loadPokemons();
    </script>
</body>
</html>
